version: "3.8"

services:
  db:
    image: postgres:15-alpine
    container_name: bloodbank_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ai_bloodbank
    ports:
      - "54321:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: bloodbank_backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/ai_bloodbank
      - SECRET_KEY=supersecretkeythatshouldbechangedinproduction
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app

  frontend:
    build: ./frontend
    container_name: bloodbank_frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  pgdata:
